name: MenuTerm
options:
  bundleIdPrefix: com.menuterm
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.0.0"
targets:
  MenuTerm:
    type: application
    platform: macOS
    sources:
      - path: MenuTerm
      - path: logo.icon
        buildPhase: resources
    dependencies:
      - package: SwiftTerm
        product: SwiftTerm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.menuterm.app
        ASSETCATALOG_COMPILER_APPICON_NAME: logo
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: Resources/MenuTerm.entitlements
        SWIFT_VERSION: "5.9"
        CODE_SIGN_IDENTITY: "-"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_LSUIElement: true
